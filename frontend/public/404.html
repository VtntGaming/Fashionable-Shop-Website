<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fashionable Shop</title>
    <script>
      (function () {
        const { pathname, search, hash } = window.location;
        const repoBase = pathname.split('/').slice(0, 2).join('/');
        const routePath = pathname.slice(repoBase.length) || '/';
        const redirectUrl = `${repoBase}/?p=${encodeURIComponent(`${routePath}${search}${hash}`)}`;

        window.location.replace(redirectUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
