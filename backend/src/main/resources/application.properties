# Load optional local secrets file for development.
# In GitHub Actions, the same keys can be provided through repository/environment secrets.
spring.config.import=optional:file:./.env.properties,optional:file:./fashion-shop/.env.properties

# Server / proxy
server.port=${PORT:${SERVER_PORT:8080}}
server.forward-headers-strategy=framework

# Public URLs for deployed environments (Railway, GitHub Pages, etc.)
app.base-url=${APP_BASE_URL:http://localhost:${server.port}}
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:${app.frontend-url},http://localhost:3000,http://127.0.0.1:3000,http://localhost:5500,http://127.0.0.1:5500}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fashion_shop?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:ZGV2LW9ubHktand0LXNlY3JldC1mb3ItbG9jYWwtdGVzdHMtb25seS1jaGFuZ2UtbWU=}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Security
spring.security.user.name=${SPRING_SECURITY_USER_NAME:admin}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD:change-me-local}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:DEBUG}

# VNPay Payment Configuration
vnpay.tmn-code=${VNPAY_TMN_CODE:}
vnpay.hash-secret=${VNPAY_HASH_SECRET:}
vnpay.api-url=${VNPAY_API_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.return-url=${VNPAY_RETURN_URL:${app.frontend-url}/payment-result}
vnpay.notify-url=${VNPAY_NOTIFY_URL:${app.base-url}/api/payments/vnpay/ipn}

# Email Configuration
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
app.mail.from=${APP_MAIL_FROM:noreply@fashionable-shop.com}

# File Upload Configuration
file.upload-dir=./uploads
file.max-file-size=5242880
file.allowed-extensions=jpg,jpeg,png,webp
file.product-images-dir=products

# Google OAuth2 Configuration
# Note: Get these from Google Cloud Console (https://console.cloud.google.com)
# 1. Create OAuth 2.0 Client ID for Web Application
# 2. Set Authorized Redirect URI to your deployed backend, e.g. https://your-backend.up.railway.app/login/oauth2/code/google
#    (keep http://localhost:8080/login/oauth2/code/google for local dev if needed)
# 3. Put the values in `backend/.env.properties` locally or Railway Variables / GitHub Secrets in CI.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://www.googleapis.com/oauth2/v4/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v1/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub
spring.security.oauth2.client.provider.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs
file.user-avatars-dir=avatars