$kind: http-request
name: Create Order
method: POST
url: '{{baseUrl}}/api/orders'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "shippingAddress": "123 Main St, City",
      "phone": "0123456789",
      "paymentMethod": "COD"
    }
