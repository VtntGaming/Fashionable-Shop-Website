$kind: http-request
name: Create Voucher
method: POST
url: '{{baseUrl}}/api/vouchers'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "code": "SAVE10",
      "discountType": "PERCENT",
      "discountValue": 10,
      "startDate": "2025-01-01T00:00:00",
      "endDate": "2025-12-31T23:59:59",
      "minOrderValue": 50.00,
      "maxDiscount": 20.00,
      "quantity": 100,
      "status": "ACTIVE"
    }
