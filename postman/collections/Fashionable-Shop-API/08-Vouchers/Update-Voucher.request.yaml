$kind: http-request
name: Update Voucher
method: PUT
url: '{{baseUrl}}/api/vouchers/{{voucherId}}'
order: 5000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "code": "SAVE15",
      "discountType": "PERCENT",
      "discountValue": 15,
      "startDate": "2025-01-01T00:00:00",
      "endDate": "2025-12-31T23:59:59",
      "minOrderValue": 50.00,
      "maxDiscount": 25.00,
      "quantity": 50,
      "status": "ACTIVE"
    }
