$kind: http-request
name: Add To Cart
method: POST
url: '{{baseUrl}}/api/carts/add'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "productId": 1,
      "quantity": 2
    }
