$kind: http-request
name: Update Cart Item
method: PUT
url: '{{baseUrl}}/api/carts/update'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "cartItemId": 1,
      "quantity": 3
    }
