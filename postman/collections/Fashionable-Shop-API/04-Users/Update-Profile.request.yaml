$kind: http-request
name: Update Profile
method: PUT
url: '{{baseUrl}}/api/users/profile'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "fullName": "Jane Doe",
      "phone": "0987654321",
      "address": "123 Main St, City"
    }
