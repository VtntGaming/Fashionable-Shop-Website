$kind: http-request
name: Update Category
method: PUT
url: '{{baseUrl}}/api/categories/{{categoryId}}'
order: 6000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Men's Fashion",
      "slug": "mens-fashion",
      "description": "Updated description",
      "imageUrl": "https://example.com/category.jpg",
      "parentId": null
    }
