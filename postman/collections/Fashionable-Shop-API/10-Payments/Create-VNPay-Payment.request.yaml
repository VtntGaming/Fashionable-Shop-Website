$kind: http-request
name: Create VNPay Payment
method: POST
url: '{{baseUrl}}/api/payments/vnpay/create'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "orderId": 1,
      "paymentMethod": "VNPAY"
    }
