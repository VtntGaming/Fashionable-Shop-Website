$kind: http-request
name: Create Review
method: POST
url: '{{baseUrl}}/api/reviews'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "productId": 1,
      "rating": 5,
      "comment": "Great product!"
    }
