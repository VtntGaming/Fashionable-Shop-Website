$kind: http-request
name: Update Review
method: PUT
url: '{{baseUrl}}/api/reviews/{{reviewId}}'
order: 5000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "rating": 4,
      "comment": "Updated review comment"
    }
