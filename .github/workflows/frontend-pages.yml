name: Fashion Shop Frontend Pages Deploy

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Inject API base URL for Pages
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "API_BASE_URL secret is not set" >&2
            exit 1
          fi
          echo "Using API_BASE_URL=$API_BASE_URL"
          sed -i "s|__API_BASE_URL__|$API_BASE_URL|g" frontend/js/config.js
          if grep -q "__API_BASE_URL__" frontend/js/config.js; then
            echo "API placeholder replacement failed" >&2
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
