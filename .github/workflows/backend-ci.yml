name: Fashion Shop Backend CI

on:
  push:
    paths:
      - 'fashion-shop/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'fashion-shop/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: fashion_shop
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    defaults:
      run:
        working-directory: fashion-shop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Resolve app config from file or GitHub Secrets
        shell: bash
        env:
          GH_SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          GH_SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          GH_SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          GH_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GH_VNPAY_TMN_CODE: ${{ secrets.VNPAY_TMN_CODE }}
          GH_VNPAY_HASH_SECRET: ${{ secrets.VNPAY_HASH_SECRET }}
          GH_SPRING_MAIL_USERNAME: ${{ secrets.SPRING_MAIL_USERNAME }}
          GH_SPRING_MAIL_PASSWORD: ${{ secrets.SPRING_MAIL_PASSWORD }}
          GH_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GH_GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          resolve_config() {
            local key="$1"
            local secret_value="$2"
            local fallback="${3:-}"

            if [ -n "$secret_value" ]; then
              echo "${key}=${secret_value}" >> "$GITHUB_ENV"
              return 0
            fi

            if [ -f ".env.properties" ]; then
              local file_value
              file_value="$(grep -E "^${key}=" .env.properties | tail -n1 | cut -d= -f2-)"
              if [ -n "$file_value" ]; then
                echo "${key}=${file_value}" >> "$GITHUB_ENV"
                return 0
              fi
            fi

            if [ -n "$fallback" ]; then
              echo "${key}=${fallback}" >> "$GITHUB_ENV"
            fi
          }

          resolve_config "SPRING_DATASOURCE_URL" "$GH_SPRING_DATASOURCE_URL" "jdbc:mysql://127.0.0.1:3306/fashion_shop?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true"
          resolve_config "SPRING_DATASOURCE_USERNAME" "$GH_SPRING_DATASOURCE_USERNAME" "root"
          resolve_config "SPRING_DATASOURCE_PASSWORD" "$GH_SPRING_DATASOURCE_PASSWORD" "root"
          resolve_config "JWT_SECRET" "$GH_JWT_SECRET" "ZGV2LW9ubHktand0LXNlY3JldC1mb3ItY2ktdGVzdHMtb25seQ=="
          resolve_config "VNPAY_TMN_CODE" "$GH_VNPAY_TMN_CODE" "TEST_TMN_CODE"
          resolve_config "VNPAY_HASH_SECRET" "$GH_VNPAY_HASH_SECRET" "TEST_HASH_SECRET_32_CHARS_LONG_123"
          resolve_config "SPRING_MAIL_USERNAME" "$GH_SPRING_MAIL_USERNAME"
          resolve_config "SPRING_MAIL_PASSWORD" "$GH_SPRING_MAIL_PASSWORD"
          resolve_config "GOOGLE_CLIENT_ID" "$GH_GOOGLE_CLIENT_ID" "test-client-id.apps.googleusercontent.com"
          resolve_config "GOOGLE_CLIENT_SECRET" "$GH_GOOGLE_CLIENT_SECRET" "test-client-secret"

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -uroot -proot --silent && exit 0
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Run backend tests
        run: |
          chmod +x mvnw
          ./mvnw -B test
